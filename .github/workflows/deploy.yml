# GitHub Actions 配置文件：用于自动部署 Hexo 博客
name: Deploy Hexo

# 当 main 分支被 push 时触发部署流程
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # 使用最新版 Ubuntu 运行环境
    runs-on: ubuntu-latest

    # 允许对仓库内容进行写操作（git push）
    permissions:
      contents: write

    steps:
      # Step 1：检出仓库源码
      - uses: actions/checkout@v4

      # Step 2：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Step 3：安装依赖
      - name: Install dependencies
        run: npm install

      # Step 4：生成 Hexo 静态文件
      - name: Generate Hexo static files
        run: npx hexo generate

      # Step 4.5: 沃日了怎么还要安装git??
      - name: Install Developer Git
        run: npm install hexo-deployer-git --save

      # Step 5：PUSH!
      - name: Generate Hexo static files
        run: npx hexo d
