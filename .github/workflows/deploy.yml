name: Deploy Hexo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install
          npm install hexo-deployer-git --save

      - name: Configure Git
        run: |
          git config --global user.email "e.lythra@qq.com"
          git config --global user.name "ElythraDev"

      - name: Deploy to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用包含 token 的 URL 覆盖部署配置，避免交互式密码输入
          npx hexo clean
          npx hexo generate
          # 直接在运行命令时动态注入地址，安全且高效
          npx hexo deploy
