name: Deploy Hexo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install
          npm install hexo-deployer-git --save

      - name: Configure Git
        run: |
          git config --global user.email "e.lythra@qq.com"
          git config --global user.name "ElythraDev"

      - name: Deploy to GitHub
        env:
          # GitHub Actions 会自动识别这个环境变量来处理 https 认证
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install hexo-deployer-git --save
          
          npx hexo clean
          npx hexo generate
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ElythraDev/elythradev.github.io.git
          
          npx hexo deploy
