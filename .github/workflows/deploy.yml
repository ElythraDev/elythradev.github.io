name: Deploy Hexo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 建议用 20 LTS，更稳定

      - name: Install dependencies
        run: npm install

      - name: Generate Hexo static files
        run: npx hexo generate

      - name: Install hexo-deployer-git
        run: npm install hexo-deployer-git --save

      - name: Configure Git
        run: |
          git config --global user.email "e.lythra@qq.com"
          git config --global user.name "ElythraDev"

      - name: Deploy to GitHub
        run: |
          # 修正：github.com/ 后面是斜杠，不是冒号
          git remote set-url origin https://ElythraDev:${{ secrets.GITHUB_TOKEN }}@github.com/ElythraDev/elythradev.github.io.git
          npx hexo deploy
